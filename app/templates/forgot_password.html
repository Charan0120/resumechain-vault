{% extends "base.html" %}
{% block title %}Forgot Password{% endblock %}

{% block content %}
<div class="auth-wrapper">

  <div class="orb" style="width:380px;height:380px;top:5%;right:10%;background:rgba(124,58,237,0.07);"></div>

  <div class="auth-box anim-1">

    <div class="auth-logo">
      <a href="{{ url_for('main.index') }}" class="auth-logo-link">
        <div class="brand-icon">🔐</div>
        Resume<span class="gradient-text">Vault</span>
      </a>
      <h1 class="auth-title">Reset your password</h1>
      <p class="auth-sub">Enter your email and we'll send a reset link</p>
    </div>

    <div class="card">
      <form method="POST" action="{{ url_for('auth.forgot_password') }}" id="forgot-form" novalidate>

        <div class="form-group" style="margin-bottom:28px;">
          <label for="forgot-email" class="form-label">Email Address</label>
          <div class="input-wrap">
            <span class="input-icon">✉️</span>
            <input
              id="forgot-email"
              type="email"
              name="email"
              class="form-input"
              placeholder="you@example.com"
              autocomplete="email"
              required
            />
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg" id="forgot-submit">
          → Send Reset Link
        </button>
      </form>

      <div class="divider"></div>

      <p class="auth-footer">
        Remembered it?
        <a href="{{ url_for('auth.login') }}" class="auth-link" id="forgot-back-login">Back to Sign In</a>
      </p>
    </div>

  </div>
</div>
{% endblock %}
