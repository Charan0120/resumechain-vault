{% extends "base.html" %}
{% block title %}Sign In{% endblock %}

{% block content %}
<div class="auth-wrapper">

  <!-- Orbs -->
  <div class="orb" style="width:400px;height:400px;top:5%;left:5%;background:rgba(124,58,237,0.07);"></div>
  <div class="orb" style="width:300px;height:300px;bottom:5%;right:5%;background:rgba(6,182,212,0.05);"></div>

  <div class="auth-box anim-1">

    <!-- Logo -->
    <div class="auth-logo">
      <a href="{{ url_for('main.index') }}" class="auth-logo-link">
        <div class="brand-icon">🔐</div>
        Resume<span class="gradient-text">Vault</span>
      </a>
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-sub">Sign in to access your secure vault</p>
    </div>

    <!-- Card -->
    <div class="card">
      <form method="POST" action="{{ url_for('auth.login') }}" id="login-form" novalidate>

        <!-- Email -->
        <div class="form-group">
          <label for="login-email" class="form-label">Email Address</label>
          <div class="input-wrap">
            <span class="input-icon">✉️</span>
            <input
              id="login-email"
              type="email"
              name="email"
              class="form-input"
              placeholder="you@example.com"
              value="{{ email }}"
              autocomplete="email"
              required
            />
          </div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <div class="form-row">
            <label for="login-password" class="form-label" style="margin:0;">Password</label>
            <a href="{{ url_for('auth.forgot_password') }}" class="auth-link" style="font-size:13px;" id="forgot-link">
              Forgot password?
            </a>
          </div>
          <div class="input-wrap">
            <span class="input-icon">🔑</span>
            <input
              id="login-password"
              type="password"
              name="password"
              class="form-input"
              placeholder="••••••••"
              autocomplete="current-password"
              required
            />
            <button type="button" class="eye-toggle" aria-label="Toggle password visibility">👁</button>
          </div>
        </div>

        <!-- Remember me -->
        <div class="form-group" style="margin-bottom:24px;">
          <label class="checkbox-row">
            <input type="checkbox" name="remember" id="remember-me" />
            Keep me signed in for 7 days
          </label>
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg" id="login-submit">
          → Sign In
        </button>
      </form>

      <div class="divider"></div>

      <p class="auth-footer">
        Don't have an account?
        <a href="{{ url_for('auth.signup') }}" class="auth-link" id="goto-signup">Create one free</a>
      </p>
    </div>

  </div>
</div>
{% endblock %}
