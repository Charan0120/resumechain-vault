{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}

{% block content %}
<div class="auth-wrapper">

  <div class="auth-box anim-1">

    <div class="auth-logo">
      <a href="{{ url_for('main.index') }}" class="auth-logo-link">
        <div class="brand-icon">🔐</div>
        Resume<span class="gradient-text">Vault</span>
      </a>
      <h1 class="auth-title">Set a new password</h1>
      <p class="auth-sub">Choose a strong password for your account</p>
    </div>

    <div class="card">
      <form method="POST" action="{{ url_for('auth.reset_password', token=token) }}" id="reset-form" novalidate>

        <!-- New Password -->
        <div class="form-group">
          <label for="password" class="form-label">New Password</label>
          <div class="input-wrap">
            <span class="input-icon">🔑</span>
            <input
              id="password"
              type="password"
              name="password"
              class="form-input"
              placeholder="Min 8 chars, 1 uppercase, 1 number"
              autocomplete="new-password"
              required
            />
            <button type="button" class="eye-toggle" aria-label="Toggle">👁</button>
          </div>
          <div class="pw-rules">
            <div class="pw-rule" id="rule-len"><div class="pw-dot"></div> At least 8 characters</div>
            <div class="pw-rule" id="rule-upper"><div class="pw-dot"></div> One uppercase letter</div>
            <div class="pw-rule" id="rule-num"><div class="pw-dot"></div> One number</div>
          </div>
        </div>

        <!-- Confirm -->
        <div class="form-group" style="margin-bottom:28px;">
          <label for="confirm" class="form-label">Confirm New Password</label>
          <div class="input-wrap">
            <span class="input-icon">🔑</span>
            <input
              id="confirm"
              type="password"
              name="confirm"
              class="form-input"
              placeholder="Re-enter password"
              autocomplete="new-password"
              required
            />
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg" id="reset-submit">
          → Reset Password
        </button>
      </form>
    </div>

  </div>
</div>
{% endblock %}
