databases:
  - name: resumevault-db
    plan: free

services:
  - type: web
    name: resumevault
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn "run:app"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: resumevault-db
          property: connectionString
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11.0
